<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <script>
        // Carregar configuração
        fetch('config.json')
            .then(response => response.json())
            .then(config => {
                if (config.siteAtivo) {
                    // Site ativo - redirecionar para o principal
                    window.location.href = config.urlPrincipal;
                } else {
                    // Site inativo - redirecionar para a página de erro
                    window.location.href = 'erro-505.html';
                }
            })
            .catch(error => {
                // Em caso de erro, redirecionar para o principal
                window.location.href = '../pagina/index.html';
            });
    </script>
</head>
<body>
    <p>Redirecting...</p>
</body>
</html>
